name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Sets permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Node.js 20
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Instalar dependencias
      - name: Install dependencies
        run: npm ci

      # 4. Copiar íconos y logo de raíz → public/ antes del build
      #    (Los archivos icon-*.png y logo.png deben estar en la raíz del repo)
      - name: Copy icons and logo to public/
        run: |
          mkdir -p public
          [ -f icon-192.png ]      && cp icon-192.png      public/ || echo "⚠️  icon-192.png no encontrado"
          [ -f icon-512.png ]      && cp icon-512.png      public/ || echo "⚠️  icon-512.png no encontrado"
          [ -f icon-maskable.png ] && cp icon-maskable.png public/ || echo "⚠️  icon-maskable.png no encontrado"
          [ -f logo.png ]          && cp logo.png          public/ || echo "⚠️  logo.png no encontrado"

      # 5. Build con variable de entorno VITE_BASE_URL
      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL || '/' }}

      # 6. Subir artifact de Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # 7. Deploy
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
